name: 'bqai'
version: '0.1.0'
config-version: 2

# This is a macro-only package: it ships no models, seeds, or tests of its own.
# Consuming projects install it via packages.yml and call the macros as
# `{{ bqai.<macro>(...) }}`.
require-dbt-version: [">=1.7.0", "<2.0.0"]

macro-paths: ["macros"]

# Silence "these paths were not found" warnings for the standard dirs a macro
# package doesn't use.
model-paths: []
seed-paths: []
snapshot-paths: []
test-paths: []
analysis-paths: []
