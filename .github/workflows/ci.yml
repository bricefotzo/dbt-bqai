name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  render-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install jinja2
      - name: Offline macro render tests
        run: python3 tests/render_test.py
